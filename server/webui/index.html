<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NellDB Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="app"></div>

    <script type="module">
        import { h, render, Component } from 'https://esm.sh/preact';
        import { useState, useEffect } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';

        const html = htm.bind(h);

        function Dashboard() {
            const [stats, setStats] = useState({ node_id: '...', doc_count: 0 });
            const [docs, setDocs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);

            useEffect(() => {
                fetchStats();
                fetchDocs();
            }, []);

            async function fetchStats() {
                try {
                    const res = await fetch('/ready');
                    const data = await res.json();
                    setStats(data);
                } catch (e) { console.error(e); }
            }

            async function fetchDocs() {
                setLoading(true);
                try {
                    const res = await fetch('/sync/pull', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ since: { wall_time: 0, counter: 0 } })
                    });
                    const data = await res.json();
                    setDocs(data.changes || []);
                } catch (e) { console.error(e); }
                setLoading(false);
            }

            async function runSync() {
                setSyncing(true);
                // For the UI, we can sync against another node or just refresh
                await fetchDocs();
                await fetchStats();
                setSyncing(false);
            }

            return html`
                <div class="max-w-7xl mx-auto px-4 py-8">
                    <header class="flex justify-between items-center mb-12">
                        <div>
                            <h1 class="text-4xl font-black text-slate-900 tracking-tight flex items-center">
                                <span class="bg-indigo-600 text-white p-2 rounded-lg mr-4 flex items-center justify-center w-12 h-12">
                                    <i class="fas fa-bolt text-2xl"></i>
                                </span>
                                NellDB
                            </h1>
                            <p class="text-slate-400 mt-2 font-medium">Distributed • Real-time • 1BRC-Optimized</p>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="bg-white shadow-sm border border-slate-200 rounded-xl px-6 py-4 flex items-center space-x-12">
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Documents</p>
                                    <p class="text-2xl font-bold text-slate-900">${stats.doc_count.toLocaleString()}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Node ID</p>
                                    <p class="text-sm font-mono text-indigo-600 font-semibold">${stats.node_id}</p>
                                </div>
                            </div>
                            <button onclick=${runSync} class="bg-slate-900 text-white px-6 py-4 rounded-xl font-bold hover:bg-indigo-600 transition-all flex items-center shadow-lg shadow-indigo-200">
                                <i class="fas fa-sync-alt mr-3 ${syncing ? 'fa-spin' : ''}"></i>
                                Refresh
                            </button>
                        </div>
                    </header>

                    <main>
                        <div class="grid grid-cols-1 gap-8">
                            <section class="bg-white shadow-sm border border-slate-200 rounded-2xl overflow-hidden">
                                <div class="px-8 py-6 border-b border-slate-100 bg-slate-50/30 flex justify-between items-center">
                                    <h2 class="text-lg font-bold text-slate-800 flex items-center">
                                        <i class="fas fa-list-ul mr-3 text-slate-400"></i>
                                        Recent Records
                                    </h2>
                                    <div class="flex space-x-2">
                                        <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Feed</span>
                                    </div>
                                </div>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse">
                                        <thead>
                                            <tr class="text-slate-400 text-[10px] uppercase tracking-[0.2em] bg-slate-50/50">
                                                <th class="px-8 py-4 font-bold border-b border-slate-100">ID</th>
                                                <th class="px-8 py-4 font-bold border-b border-slate-100">Collection</th>
                                                <th class="px-8 py-4 font-bold border-b border-slate-100">Type</th>
                                                <th class="px-8 py-4 font-bold border-b border-slate-100 text-right">HLC Clock</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-50">
                                            ${docs.length === 0 ? html`
                                                <tr>
                                                    <td colspan="4" class="px-8 py-24 text-center">
                                                        <div class="flex flex-col items-center">
                                                            <i class="fas fa-inbox text-4xl text-slate-100 mb-4"></i>
                                                            <p class="text-slate-400 font-medium">${loading ? 'Hydrating local state...' : 'No records found.'}</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ` : docs.map(doc => html`
                                                <tr key=${doc.id} class="hover:bg-indigo-50/30 transition-colors group">
                                                    <td class="px-8 py-5">
                                                        <div class="flex items-center">
                                                            <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center mr-4 text-slate-400 group-hover:bg-white group-hover:text-indigo-600 transition-all border border-transparent group-hover:border-indigo-100">
                                                                <i class="fas fa-file-alt text-xs"></i>
                                                            </div>
                                                            <span class="font-mono text-sm text-slate-700 font-semibold truncate max-w-xs">${doc.id}</span>
                                                        </div>
                                                    </td>
                                                    <td class="px-8 py-5">
                                                        <span class="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded tracking-tight">${doc.collection}</span>
                                                    </td>
                                                    <td class="px-8 py-5">
                                                        <span class="text-xs font-semibold text-indigo-600/70 capitalize">${doc.type || 'text'}</span>
                                                    </td>
                                                    <td class="px-8 py-5 text-right font-mono text-[10px] text-slate-400">
                                                        ${doc.clock.wall_time}<span class="text-slate-200">/</span>${doc.clock.counter}
                                                    </td>
                                                </tr>
                                            `)}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        </div>
                    </main>

                    <footer class="mt-16 flex justify-between items-center px-2">
                        <div class="flex items-center space-x-6">
                            <a href="/ui/nell.js" class="text-[10px] font-black text-slate-300 hover:text-indigo-500 uppercase tracking-widest transition-colors">JS SDK</a>
                            <a href="/ui/nell.wasm" class="text-[10px] font-black text-slate-300 hover:text-indigo-500 uppercase tracking-widest transition-colors">WASM Core</a>
                        </div>
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">NellDB Engine v0.1 • Sydney 2026</p>
                    </footer>
                </div>
            `;
        }

        render(html`<${Dashboard} />`, document.getElementById('app'));
    </script>
</body>
</html>
